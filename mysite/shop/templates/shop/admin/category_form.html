{% extends 'base.html' %}
{% block title %}{{ title }} - Cây Cảnh Xanh{% endblock %}
{% block content %}
<div class="container" style="max-width:500px">
  <h2 class="mb-4">{{ title }}</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Lưu</button>
    <a href="{% url 'shop:category_admin_list' %}" class="btn btn-outline-secondary">Hủy</a>
  </form>
</div>
{% endblock %}
